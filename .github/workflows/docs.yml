name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-frontend-fare
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build v1.1 docs snapshot
        run: |
          git fetch --tags
          git checkout v1.1.0 -- website/ package.json package-lock.json
          npm ci
          npm run docs:build
          cp -r website/.vitepress/dist /tmp/v1.1-docs
          git checkout HEAD -- website/ package.json package-lock.json
      - name: Build v1.2 docs
        run: |
          npm ci
          npm run docs:build
          mkdir -p website/.vitepress/dist/v1.1
          cp -r /tmp/v1.1-docs/. website/.vitepress/dist/v1.1/
        env:
          VITE_MIXPANEL_TOKEN: ${{ secrets.VITE_MIXPANEL_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
