name: Codex PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-codex-review:
    name: Request Codex review
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify secret
        shell: bash
        env:
          HAS_SECRET: ${{ secrets.CODEX_REVIEW_TOKEN != '' }}
        run: |
          if [ "$HAS_SECRET" != "true" ]; then
            echo "CODEX_REVIEW_TOKEN is not configured or is empty." >&2
            exit 1
          fi

      - name: Ask reviewer to check this PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_REVIEW_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            let pr = context.payload.pull_request;
            if (context.eventName === 'workflow_dispatch') {
              const raw = context.payload.inputs?.pr_number;
              const pull_number = Number(raw);
              if (!Number.isInteger(pull_number) || pull_number <= 0) {
                core.setFailed(`Invalid pr_number input: ${raw ?? ''}`);
                return;
              }
              pr = (await github.rest.pulls.get({ owner, repo, pull_number })).data;
            }
            if (!pr) {
              core.setFailed('No pull request found.');
              return;
            }
            if (pr.draft) {
              core.info(`Skipping draft PR #${pr.number}`);
              return;
            }
            const marker = `<!-- codex-auto-review:${pr.head.sha} -->`;
            const user = (await github.rest.users.getAuthenticated()).data;
            core.info(`Authenticated as ${user.login}`);
            core.info(`Requesting review for PR #${pr.number} at ${pr.head.sha}`);
            const comments = (await github.rest.issues.listComments({ owner, repo, issue_number: pr.number, per_page: 100 })).data;
            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info(`Review already requested for ${pr.head.sha}`);
              return;
            }
            const mention = '@' + 'codex review';
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: `${marker}\n${mention}\n\nPlease review this PR for correctness, regressions, missing tests, security issues, and maintainability. Focus only on actionable findings.`,
            });
