name: Codex PR Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  request-codex-review:
    name: Request Codex review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex to review this PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const marker = `<!-- codex-auto-review:${pr.head.sha} -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info(`Codex review already requested for ${pr.head.sha}`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: `${marker}\n@codex review\n\nPlease review this PR for correctness, regressions, missing tests, security issues, and maintainability. Focus only on actionable findings.`,
            });
